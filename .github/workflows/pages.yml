name: Deploy Public Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6
      - name: Prepare Static Site
        run: |
          mkdir _site
          cp public-site/index.html public-site/styles.css _site/
          cp public/og.png _site/og.png
          cp public/favicon.svg _site/favicon.svg
          touch _site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy Site
        id: deployment
        uses: actions/deploy-pages@v4
